name: busapp
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase & Authentication  
  firebase_core: ^2.27.0  # Latest stable version  
  firebase_auth: ^4.17.4  
  cloud_firestore: ^4.15.6  


  flutter_map: ^6.2.1
  latlong2: ^0.9.0
  geolocator: ^10.1.0   # For getting live location

  # UI & Icons  
  cupertino_icons: ^1.0.8  
  flutter_map_cancellable_tile_provider: ^2.0.0
  url_launcher: ^6.1.14 
  firebase_messaging: ^14.9.4



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/cute_bus_icon.png
    - assets/background.jpg
    - assets/bus_image.png
